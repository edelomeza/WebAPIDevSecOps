name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".dockerignore"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Run Unit Tests
        run: dotnet test UnitTest/UnitTest.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=unit-test-results.trx"

      - name: Run Integration Tests
        run: dotnet test IntegrationTest/IntegrationTest.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"

      - name: Run Security Tests
        run: dotnet test SecurityTest/SecurityTest.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=security-test-results.trx"

      - name: Check Vulnerable Dependencies
        run: |
          echo "# Reporte de Dependencias Vulnerables" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          dotnet list package --vulnerable --include-transitive 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX
          mkdir -p sbom
          dotnet CycloneDX WebAPIDevSecOps/WebAPIDevSecOps.csproj \
            --json --out sbom --exclude-test-projects

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/bom.json

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/*.trx"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.REGISTRY_IMAGE || 'edelomeza/webapidevsecops' }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and Push Docker Image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ${{ vars.REGISTRY_IMAGE || 'edelomeza/webapidevsecops' }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (Keyless)
        run: |
          IMAGE_REF="${{ vars.REGISTRY_IMAGE || 'edelomeza/webapidevsecops' }}:${{ github.sha }}"
          cosign sign \
            --yes \
            --oidc-issuer "https://token.actions.githubusercontent.com" \
            --oidc-client-id "sigstore" \
            "$IMAGE_REF"

      - name: Verify signature
        run: |
          IMAGE_REF="${{ vars.REGISTRY_IMAGE || 'edelomeza/webapidevsecops' }}:${{ github.sha }}"
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci-cd.yml" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF"

      - name: Scan container with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ vars.REGISTRY_IMAGE || 'edelomeza/webapidevsecops' }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-results.sarif

  sonarcloud:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud scan
        run: |
          dotnet sonarscanner begin \
            /k:"${{ vars.SONAR_PROJECT_KEY }}" \
            /o:"${{ vars.SONAR_ORG }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/*.opencover.xml"

      - name: Build for Sonar
        run: dotnet build -c Release

      - name: Run Unit Tests with coverage
        run: >
          dotnet test UnitTest/UnitTest.csproj -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --settings coverage.runsettings

      - name: Run Integration Tests with coverage
        run: >
          dotnet test IntegrationTest/IntegrationTest.csproj -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --settings coverage.runsettings

      - name: End SonarCloud scan
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Quality Gate
        continue-on-error: true
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        with:
          scanMetadataReportFile: .sonarqube/out/.sonar/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check coverage threshold (>= 60%)
        run: python3 scripts/check_coverage.py

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=.semgrep/semgrep.yaml \
            --json-output=semgrep-report.json \
            --metrics=off

      - name: Upload Semgrep Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-report
          path: semgrep-report.json

  fuzz:
    name: RESTler Fuzzing
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 30
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate JWT token for fuzzing
        run: |
          pip install pyjwt
          python3 fuzzing/generate_token.py

      - name: Cleanup previous container
        run: docker rm -f webapi-fuzz 2>/dev/null || true

      - name: Run API container (Development mode for OpenAPI)
        run: |
          docker run -d --rm -p 8080:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e UseInMemoryDatabase=true \
            -e ConnectionStrings__DefaultConnection="unused" \
            -e Jwt__Key="CI_Test_Key_Minimum_32_Bytes_Required_For_JWT" \
            -e Jwt__Issuer="https://localhost:7000" \
            -e Jwt__Audience="https://localhost:7000" \
            --name webapi-fuzz \
            ${{ vars.REGISTRY_IMAGE || 'edelomeza/webapidevsecops' }}:${{ github.sha }}

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health/ready || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API healthy (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i: API not ready (HTTP $STATUS)"
            sleep 2
          done
          sleep 5
          FINAL=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health/ready || echo "000")
          if [ "$FINAL" != "200" ]; then
            echo "ERROR: API failed to become healthy after 30 attempts (HTTP $FINAL)"
            docker logs webapi-fuzz 2>&1 || true
            exit 1
          fi

      - name: Debug OpenAPI endpoint
        continue-on-error: true
        run: |
          echo "=== Containers running ==="
          docker ps
          echo ""
          echo "=== Health check verbose ==="
          curl -v http://localhost:8080/health/ready 2>&1 || true
          echo ""
          echo "=== OpenAPI spec (/openapi/v1.json) ==="
          curl -v http://localhost:8080/openapi/v1.json -o /dev/null 2>&1 || true
          echo ""
          echo "=== Scalar path (/scalar/v1/openapi.json) ==="
          curl -v http://localhost:8080/scalar/v1/openapi.json -o /dev/null 2>&1 || true

      - name: Download OpenAPI spec
        run: |
          mkdir -p fuzzing
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/openapi/v1.json -o fuzzing/openapi.json; then
              SIZE=$(wc -c < fuzzing/openapi.json)
              if [ "$SIZE" -gt 100 ]; then
                echo "OpenAPI spec downloaded (${SIZE} bytes)"
                exit 0
              fi
            fi
            echo "Attempt $i: OpenAPI not ready, waiting..."
            sleep 3
          done
          echo "ERROR: Failed to download OpenAPI spec"
          exit 1

      - name: Generate RESTler config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/fuzzing:/fuzzing \
            --network host \
            mcr.microsoft.com/restlerfuzzer/restler:latest \
            dotnet /RESTler/restler/Restler.dll generate_config \
              --specs /fuzzing/openapi.json \
              --output_dir /fuzzing/restler-config

      - name: Compile RESTler grammar
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/fuzzing:/fuzzing \
            --network host \
            mcr.microsoft.com/restlerfuzzer/restler:latest \
            dotnet /RESTler/restler/Restler.dll compile \
              /fuzzing/restler-config/config.json

      - name: Quick test mode
        continue-on-error: true
        run: |
          GRAMMAR=$(ls fuzzing/Compile/grammar.py 2>/dev/null || echo "")
          if [ -z "$GRAMMAR" ]; then
            GRAMMAR=$(find fuzzing -name "grammar.py" -path "*/Compile/*" | head -1)
          fi
          echo "Using grammar: $GRAMMAR"
          docker run --rm \
            -v ${{ github.workspace }}/fuzzing:/fuzzing \
            --network host \
            mcr.microsoft.com/restlerfuzzer/restler:latest \
            dotnet /RESTler/restler/Restler.dll test \
              --grammar_file $GRAMMAR \
              --settings /fuzzing/restler_settings.json \
              --token_file /fuzzing/token.txt

      - name: Full fuzzing
        continue-on-error: true
        timeout-minutes: 15
        run: |
          GRAMMAR=$(ls fuzzing/Compile/grammar.py 2>/dev/null || echo "")
          if [ -z "$GRAMMAR" ]; then
            GRAMMAR=$(find fuzzing -name "grammar.py" -path "*/Compile/*" | head -1)
          fi
          docker run --rm \
            -v ${{ github.workspace }}/fuzzing:/fuzzing \
            --network host \
            mcr.microsoft.com/restlerfuzzer/restler:latest \
            dotnet /RESTler/restler/Restler.dll fuzz \
              --grammar_file $GRAMMAR \
              --settings /fuzzing/restler_settings.json \
              --token_file /fuzzing/token.txt

      - name: Check results for bugs
        run: python3 fuzzing/check_results.py

      - name: Upload RESTler report
        if: always()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: restler-report
          path: fuzzing/RestlerResults/

  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 30
    if: github.event_name != 'pull_request'

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature before running DAST
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci-cd.yml" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ vars.REGISTRY_IMAGE || 'edelomeza/webapidevsecops' }}:${{ github.sha }}

      - name: Cleanup previous container
        run: docker rm -f webapi 2>/dev/null || true

      - name: Run API container
        run: |
          docker run -d --rm -p 8080:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e UseInMemoryDatabase=true \
            -e ConnectionStrings__DefaultConnection="unused" \
            -e Jwt__Key="CI_Test_Key_Minimum_32_Bytes_Required_For_JWT" \
            -e Jwt__Issuer="https://localhost:7000" \
            -e Jwt__Audience="https://localhost:7000" \
            --name webapi \
            ${{ vars.REGISTRY_IMAGE || 'edelomeza/webapidevsecops' }}:${{ github.sha }}

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/ready 2>/dev/null; then
              echo "API healthy on attempt $i"
              break
            fi
            echo "Attempt $i: API not ready"
            sleep 2
          done
          sleep 5
          FINAL=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health/ready || echo "000")
          if [ "$FINAL" != "200" ]; then
            echo "ERROR: API failed to become healthy after 30 attempts (HTTP $FINAL)"
            docker logs webapi 2>&1 || true
            exit 1
          fi

      - name: ZAP API Scan
        continue-on-error: true
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
              -t http://localhost:8080/openapi/v1.json \
              -f openapi \
              -r zap-report

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dast-report
          path: zap-report.*

  deploy-digitalocean:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Save previous active deployment ID
        id: prev_deploy
        run: |
          PREV=$(doctl apps list-deployments ${{ secrets.DO_APP_ID }} \
            --format ID,Phase --no-header 2>/dev/null | \
            grep 'active' | head -1 | awk '{print $1}')
          echo "prev_id=$PREV" >> "$GITHUB_OUTPUT"
          echo "Previous active deployment: $PREV"

      - name: Create deployment and wait
        id: deploy
        run: |
          DEPLOY_ID=$(doctl apps create-deployment ${{ secrets.DO_APP_ID }} \
            --wait --format ID --no-header 2>&1 | tail -1)
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "New deployment ID: $DEPLOY_ID"

      - name: Verify health endpoint
        run: |
          URL="${{ vars.DO_APP_URL }}"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health/ready" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS"
            sleep 10
          done
          echo "ERROR: Health check failed after deployment"
          exit 1

      - name: Smoke test
        env:
          BASE_URL: ${{ vars.DO_APP_URL }}
        run: bash scripts/smoke-test.sh

      - name: Rollback on failure
        if: failure() && steps.prev_deploy.outputs.prev_id != ''
        run: |
          echo "Rolling back to deployment ${{ steps.prev_deploy.outputs.prev_id }}"
          doctl apps rollback ${{ secrets.DO_APP_ID }} \
            --deployment ${{ steps.prev_deploy.outputs.prev_id }}
